name: release-all

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional release version override without the v prefix (for example 0.2.5)"
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/target-shared

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare_release:
    runs-on: ubuntu-22.04
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      release_version: ${{ steps.prepare.outputs.release_version }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      release_built_at: ${{ steps.prepare.outputs.release_built_at }}
      release_repository: ${{ steps.prepare.outputs.release_repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          INPUT_RELEASE_VERSION: ${{ github.event.inputs.release_version || '' }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          from datetime import datetime, timezone

          repo = os.environ["GH_REPO"]
          sha = os.environ["GH_SHA"]
          manual_version = os.environ.get("INPUT_RELEASE_VERSION", "").strip().lstrip("vV")
          output = os.environ["GITHUB_OUTPUT"]

          releases_raw = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/releases?per_page=100"],
              text=True,
          )
          releases = json.loads(releases_raw)

          for release in releases:
              target = str(release.get("target_commitish") or "").strip()
              if target == sha:
                  with open(output, "a", encoding="utf-8") as fh:
                      fh.write("should_release=false\n")
                  raise SystemExit(0)

          version_pattern = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)$")
          versions = []
          for release in releases:
              if release.get("draft") or release.get("prerelease"):
                  continue
              tag = str(release.get("tag_name") or "").strip()
              match = version_pattern.fullmatch(tag)
              if not match:
                  continue
              versions.append(tuple(int(part) for part in match.groups()))

          if manual_version:
              match = version_pattern.fullmatch(manual_version)
              if not match:
                  raise SystemExit(f"Invalid release version override: {manual_version}")
              next_version = tuple(int(part) for part in match.groups())
          elif versions:
              major, minor, patch = max(versions)
              next_version = (major, minor, patch + 1)
          else:
              next_version = (0, 0, 1)

          release_version = ".".join(str(part) for part in next_version)
          release_tag = f"v{release_version}"
          built_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          with open(output, "a", encoding="utf-8") as fh:
              fh.write("should_release=true\n")
              fh.write(f"release_version={release_version}\n")
              fh.write(f"release_tag={release_tag}\n")
              fh.write(f"release_built_at={built_at}\n")
              fh.write(f"release_repository={repo}\n")
          PY

      - name: Skip duplicate release
        if: ${{ steps.prepare.outputs.should_release != 'true' }}
        run: echo "Release already exists for this commit; skipping."

  build_and_publish:
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.should_release == 'true' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup release environment
        uses: ./.github/actions/setup-release-env

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip

      - name: Install frontend dependencies
        working-directory: apps
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps
        run: pnpm run build

      - name: Build Linux binaries with injected release metadata
        shell: bash
        env:
          CODEXMANAGER_RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
          CODEXMANAGER_RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          CODEXMANAGER_RELEASE_REPOSITORY: ${{ needs.prepare_release.outputs.release_repository }}
          CODEXMANAGER_RELEASE_BUILT_AT: ${{ needs.prepare_release.outputs.release_built_at }}
        run: |
          set -euo pipefail
          cargo build -p codexmanager-service --release
          cargo build -p codexmanager-web --release --features embedded-ui
          cargo build -p codexmanager-start --release

      - name: Stage Linux release assets
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          RELEASE_REPOSITORY: ${{ needs.prepare_release.outputs.release_repository }}
          RELEASE_BUILT_AT: ${{ needs.prepare_release.outputs.release_built_at }}
        run: |
          set -euo pipefail

          release_dir="${CARGO_TARGET_DIR}/release"
          assets_dir="${release_dir}/release-assets"
          mkdir -p "$assets_dir"

          stage_binary_zip() {
            local binary_name="$1"
            local archive_name="$2"
            local stage_dir="${assets_dir}/${archive_name%.zip}"

            rm -rf "$stage_dir"
            mkdir -p "$stage_dir"
            cp -f "${release_dir}/${binary_name}" "${stage_dir}/${binary_name}"
            chmod +x "${stage_dir}/${binary_name}"
            (
              cd "$assets_dir"
              zip -q -r "$archive_name" "${archive_name%.zip}"
            )
          }

          stage_binary_zip "codexmanager-service" "CodexManager-service-linux-x86_64.zip"
          stage_binary_zip "codexmanager-web" "CodexManager-web-linux-x86_64.zip"
          stage_binary_zip "codexmanager-start" "CodexManager-start-linux-x86_64.zip"

          cp docker/docker-compose.release.yml "${assets_dir}/docker-compose.release.yml"

          cat > "${assets_dir}/release-manifest.json" <<EOF
          {
            "version": "${RELEASE_VERSION}",
            "releaseTag": "${RELEASE_TAG}",
            "repository": "${RELEASE_REPOSITORY}",
            "builtAt": "${RELEASE_BUILT_AT}",
            "images": {
              "service": "ghcr.io/${{ github.repository_owner }}/codexmanager-service:${RELEASE_TAG}",
              "serviceLatest": "ghcr.io/${{ github.repository_owner }}/codexmanager-service:latest",
              "web": "ghcr.io/${{ github.repository_owner }}/codexmanager-web:${RELEASE_TAG}",
              "webLatest": "ghcr.io/${{ github.repository_owner }}/codexmanager-web:latest"
            }
          }
          EOF

      - name: Build release Docker images
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          RELEASE_REPOSITORY: ${{ needs.prepare_release.outputs.release_repository }}
          RELEASE_BUILT_AT: ${{ needs.prepare_release.outputs.release_built_at }}
        run: |
          set -euo pipefail

          release_dir="${CARGO_TARGET_DIR}/release"
          docker_stage="${release_dir}/docker-release"

          rm -rf "$docker_stage"
          mkdir -p "$docker_stage/docker"

          cp docker/Dockerfile.service.release "$docker_stage/Dockerfile.service"
          cp docker/Dockerfile.web.release "$docker_stage/Dockerfile.web"
          cp docker/entrypoint.sh "$docker_stage/docker/entrypoint.sh"
          cp "${release_dir}/codexmanager-service" "$docker_stage/codexmanager-service"
          cp "${release_dir}/codexmanager-web" "$docker_stage/codexmanager-web"
          chmod +x "$docker_stage"/codexmanager-*
          chmod +x "$docker_stage"/docker/entrypoint.sh

          docker build \
            -f "$docker_stage/Dockerfile.service" \
            --build-arg RELEASE_VERSION="$RELEASE_VERSION" \
            --build-arg RELEASE_TAG="$RELEASE_TAG" \
            --build-arg RELEASE_REPOSITORY="$RELEASE_REPOSITORY" \
            --build-arg RELEASE_BUILT_AT="$RELEASE_BUILT_AT" \
            -t codexmanager-service:release \
            "$docker_stage"

          docker build \
            -f "$docker_stage/Dockerfile.web" \
            --build-arg RELEASE_VERSION="$RELEASE_VERSION" \
            --build-arg RELEASE_TAG="$RELEASE_TAG" \
            --build-arg RELEASE_REPOSITORY="$RELEASE_REPOSITORY" \
            --build-arg RELEASE_BUILT_AT="$RELEASE_BUILT_AT" \
            -t codexmanager-web:release \
            "$docker_stage"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker images
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"

          docker tag codexmanager-service:release "ghcr.io/${owner}/codexmanager-service:${RELEASE_TAG}"
          docker tag codexmanager-service:release "ghcr.io/${owner}/codexmanager-service:latest"
          docker tag codexmanager-web:release "ghcr.io/${owner}/codexmanager-web:${RELEASE_TAG}"
          docker tag codexmanager-web:release "ghcr.io/${owner}/codexmanager-web:latest"

          docker push "ghcr.io/${owner}/codexmanager-service:${RELEASE_TAG}"
          docker push "ghcr.io/${owner}/codexmanager-service:latest"
          docker push "ghcr.io/${owner}/codexmanager-web:${RELEASE_TAG}"
          docker push "ghcr.io/${owner}/codexmanager-web:latest"

      - name: List release assets
        run: find "${CARGO_TARGET_DIR}/release/release-assets" -type f | sort

      - name: Publish GitHub Release
        uses: ./.github/actions/publish-github-release
        with:
          tag: ${{ needs.prepare_release.outputs.release_tag }}
          ref: ${{ github.sha }}
          prerelease-input: false
          assets-dir: ${{ env.CARGO_TARGET_DIR }}/release/release-assets
