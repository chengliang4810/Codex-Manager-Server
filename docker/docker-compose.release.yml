services:
  codexmanager-service:
    image: ghcr.io/chengliang4810/codexmanager-service:latest
    restart: unless-stopped
    environment:
      CODEXMANAGER_WEB_ACCESS_PASSWORD: ${CODEXMANAGER_WEB_ACCESS_PASSWORD:?set CODEXMANAGER_WEB_ACCESS_PASSWORD}
    volumes:
      - ../data:/data

  codexmanager-web:
    image: ghcr.io/chengliang4810/codexmanager-web:latest
    restart: unless-stopped
    depends_on:
      codexmanager-service:
        condition: service_healthy
    volumes:
      - ../data:/data
    ports:
      - "48761:48761"
